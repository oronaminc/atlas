# Internal GitLab CI: test → build (kaniko) → push to internal registry → manifest validation
#
# Replace internal mirror endpoints via GitLab CI/CD Variables or the variables block below:
#   PYTHON_IMAGE / NODE_IMAGE / KANIKO_IMAGE  → image paths on the internal mirror
#   PIP_INDEX_URL / UV_DEFAULT_INDEX          → internal PyPI mirror
#   NPM_REGISTRY                              → internal npm mirror
#
# Image tag strategy (paired with Flux image automation):
#   main branch:  main-<pipeline_iid>-<short_sha>   ← ImagePolicy tracks iid numerically ascending
#   git tag:      <tag> (e.g. v0.1.0)

stages:
  - test
  - build
  - validate

variables:
  PYTHON_IMAGE: "python:3.12-slim"
  NODE_IMAGE: "node:22-alpine"
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"
  KUBECTL_IMAGE: "bitnami/kubectl:1.31"
  # PIP_INDEX_URL: "https://nexus.internal/repository/pypi/simple"
  # UV_DEFAULT_INDEX: "https://nexus.internal/repository/pypi/simple"
  # NPM_REGISTRY: "https://nexus.internal/repository/npm/"

test-backend:
  stage: test
  image: $PYTHON_IMAGE
  cache:
    key: uv-$CI_COMMIT_REF_SLUG
    paths: [backend/.venv]
  script:
    - pip install --quiet uv
    - cd backend
    - uv sync
    - uv run ruff check .
    - uv run black --check .
    - uv run pytest -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test-frontend:
  stage: test
  image: $NODE_IMAGE
  cache:
    key: pnpm-$CI_COMMIT_REF_SLUG
    paths: [frontend/node_modules]
  variables:
    # Air-gap: corepack must fetch pnpm (pinned via package.json "packageManager")
    # from the internal mirror, never registry.npmjs.org. INTEGRITY_KEYS=0 skips
    # signature checks against public keys (unreachable offline).
    COREPACK_NPM_REGISTRY: "$NPM_REGISTRY"
    COREPACK_INTEGRITY_KEYS: "0"
    COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  script:
    # Fail loud if the mirror isn't configured — never silently hit npmjs.org.
    - if [ -z "$NPM_REGISTRY" ]; then echo "NPM_REGISTRY is required (set it as a CI/CD variable, e.g. https://repo.sktelecom.com/repository/npm/)"; exit 1; fi
    - corepack enable
    - cd frontend
    - corepack prepare --activate
    - pnpm install --frozen-lockfile --registry "$NPM_REGISTRY"
    - pnpm lint
    - pnpm build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test-pg-concurrency:
  stage: test
  image: $PYTHON_IMAGE
  services:
    - name: postgres:16-alpine
      alias: postgres
  variables:
    POSTGRES_USER: atlas
    POSTGRES_PASSWORD: atlas
    POSTGRES_DB: atlas
    ATLAS_PG_TEST_URL: "postgresql+asyncpg://atlas:atlas@postgres:5432/atlas"
  script:
    - pip install --quiet uv
    - cd backend
    - uv sync
    - uv run pytest tests/pg -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---- Image builds (kaniko: no docker daemon / privileged mode needed) ----

.build-image:
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  variables:
    GIT_DEPTH: "1"
  before_script:
    - mkdir -p /kaniko/.docker
    # Default GitLab container registry credentials ($CI_REGISTRY_* are auto-injected by GitLab)
    - >
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}"
      > /kaniko/.docker/config.json
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export IMAGE_TAG="$CI_COMMIT_TAG"
      else
        export IMAGE_TAG="main-${CI_PIPELINE_IID}-${CI_COMMIT_SHORT_SHA}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build-backend:
  extends: .build-image
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/backend"
      --dockerfile "$CI_PROJECT_DIR/backend/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/backend:$IMAGE_TAG"
      --destination "$CI_REGISTRY_IMAGE/backend:latest"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/backend/cache"

build-frontend:
  extends: .build-image
  script:
    # Subpath deploy: bake the path prefix into the SPA's asset URLs at build.
    # Same value dev+prod, so one image serves both (only the host differs).
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/frontend"
      --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile"
      --build-arg "VITE_BASE_PATH=${VITE_BASE_PATH:-/alert-hub/}"
      --destination "$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG"
      --destination "$CI_REGISTRY_IMAGE/frontend:latest"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/frontend/cache"

# ---- Manifest render validation (preview what Flux will apply) ----

validate-manifests:
  stage: validate
  image:
    name: $KUBECTL_IMAGE
    entrypoint: [""]
  script:
    - kubectl kustomize deploy/k8s/base > /tmp/base.yaml
    - kubectl kustomize deploy/k8s/overlays/dev > /tmp/dev.yaml
    - kubectl kustomize deploy/k8s/overlays/prod > /tmp/prod.yaml
    - wc -l /tmp/base.yaml /tmp/dev.yaml /tmp/prod.yaml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: [deploy/**/*]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
