# 내부망 GitLab CI: test → build(kaniko) → 내부 레지스트리 push → manifest 검증
#
# 내부 미러 주소는 GitLab CI/CD Variables 또는 아래 variables 에서 교체:
#   PYTHON_IMAGE / NODE_IMAGE / KANIKO_IMAGE  → 내부 미러의 이미지 경로
#   PIP_INDEX_URL / UV_DEFAULT_INDEX          → 내부 PyPI 미러
#   NPM_REGISTRY                              → 내부 npm 미러
#
# 이미지 태그 전략 (Flux image automation과 맞물림):
#   main 브랜치:  main-<pipeline_iid>-<short_sha>   ← ImagePolicy가 iid 숫자 오름차순 추적
#   git 태그:     <tag> (예: v0.1.0)

stages:
  - test
  - build
  - validate

variables:
  PYTHON_IMAGE: "python:3.12-slim"
  NODE_IMAGE: "node:22-alpine"
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"
  KUBECTL_IMAGE: "bitnami/kubectl:1.31"
  # PIP_INDEX_URL: "https://nexus.internal/repository/pypi/simple"
  # UV_DEFAULT_INDEX: "https://nexus.internal/repository/pypi/simple"
  # NPM_REGISTRY: "https://nexus.internal/repository/npm/"

test-backend:
  stage: test
  image: $PYTHON_IMAGE
  cache:
    key: uv-$CI_COMMIT_REF_SLUG
    paths: [backend/.venv]
  script:
    - pip install --quiet uv
    - cd backend
    - uv sync
    - uv run ruff check .
    - uv run black --check .
    - uv run pytest -q
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

test-frontend:
  stage: test
  image: $NODE_IMAGE
  cache:
    key: pnpm-$CI_COMMIT_REF_SLUG
    paths: [frontend/node_modules]
  script:
    - corepack enable
    - cd frontend
    - if [ -n "$NPM_REGISTRY" ]; then pnpm config set registry "$NPM_REGISTRY"; fi
    - pnpm install --frozen-lockfile
    - pnpm lint
    - pnpm build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ---- 이미지 빌드 (kaniko: docker 데몬/privileged 불필요) ----

.build-image:
  stage: build
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  variables:
    GIT_DEPTH: "1"
  before_script:
    - mkdir -p /kaniko/.docker
    # GitLab 컨테이너 레지스트리 기본 자격증명 ($CI_REGISTRY_*는 GitLab이 자동 주입)
    - >
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}"
      > /kaniko/.docker/config.json
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export IMAGE_TAG="$CI_COMMIT_TAG"
      else
        export IMAGE_TAG="main-${CI_PIPELINE_IID}-${CI_COMMIT_SHORT_SHA}"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build-backend:
  extends: .build-image
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/backend"
      --dockerfile "$CI_PROJECT_DIR/backend/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/backend:$IMAGE_TAG"
      --destination "$CI_REGISTRY_IMAGE/backend:latest"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/backend/cache"

build-frontend:
  extends: .build-image
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR/frontend"
      --dockerfile "$CI_PROJECT_DIR/frontend/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG"
      --destination "$CI_REGISTRY_IMAGE/frontend:latest"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/frontend/cache"

# ---- 매니페스트 렌더링 검증 (Flux가 적용할 내용 사전 확인) ----

validate-manifests:
  stage: validate
  image:
    name: $KUBECTL_IMAGE
    entrypoint: [""]
  script:
    - kubectl kustomize deploy/k8s/base > /tmp/base.yaml
    - kubectl kustomize deploy/k8s/overlays/dev > /tmp/dev.yaml
    - kubectl kustomize deploy/k8s/overlays/prod > /tmp/prod.yaml
    - wc -l /tmp/base.yaml /tmp/dev.yaml /tmp/prod.yaml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: [deploy/**/*]
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
