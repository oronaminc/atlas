apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: atlas
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: atlas
  path: ./deploy/k8s/overlays/prod
  prune: true
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: atlas-backend
      namespace: atlas
    - apiVersion: apps/v1
      kind: Deployment
      name: atlas-frontend
      namespace: atlas
    - apiVersion: apps/v1
      kind: Deployment
      name: atlas-worker
      namespace: atlas
