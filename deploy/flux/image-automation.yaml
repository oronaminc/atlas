# Auto-commits the highest semver image tag (CI pushes 0.1.<pipeline-iid>) into
# the prod overlay (deploy/k8s/overlays/prod) via Setters.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: atlas-backend
  namespace: flux-system
spec:
  image: registry.gitlab.internal/platform/atlas/backend   # replace
  interval: 1m
  # if registry auth is required:
  # secretRef:
  #   name: atlas-registry-auth   # kubectl create secret docker-registry ...
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: atlas-frontend
  namespace: flux-system
spec:
  image: registry.gitlab.internal/platform/atlas/frontend  # replace
  interval: 1m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: atlas-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: atlas-backend
  # Only consider X.Y.Z tags (ignores :latest, :dev); pick the highest semver.
  filterTags:
    pattern: '^\d+\.\d+\.\d+$'
  policy:
    semver:
      range: '>=0.1.0'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: atlas-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: atlas-frontend
  # Only consider X.Y.Z tags (ignores :latest, :dev); pick the highest semver.
  filterTags:
    pattern: '^\d+\.\d+\.\d+$'
  policy:
    semver:
      range: '>=0.1.0'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: atlas
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: atlas
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxbot
        email: flux@internal.example.com
      messageTemplate: "chore: update images to {{range .Changed.Changes}}{{print .NewValue}} {{end}}"
    push:
      branch: main
  update:
    path: ./deploy/k8s/overlays/prod
    strategy: Setters
