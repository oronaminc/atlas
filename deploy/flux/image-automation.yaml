# Auto-commits new image tags (main-<iid>-<sha>) pushed by CI into the prod overlay.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: atlas-backend
  namespace: flux-system
spec:
  image: registry.gitlab.internal/platform/atlas/backend   # replace
  interval: 1m
  # if registry auth is required:
  # secretRef:
  #   name: atlas-registry-auth   # kubectl create secret docker-registry ...
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: atlas-frontend
  namespace: flux-system
spec:
  image: registry.gitlab.internal/platform/atlas/frontend  # replace
  interval: 1m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: atlas-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: atlas-backend
  filterTags:
    pattern: '^main-(?P<iid>\d+)-.+$'
    extract: '$iid'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: atlas-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: atlas-frontend
  filterTags:
    pattern: '^main-(?P<iid>\d+)-.+$'
    extract: '$iid'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: atlas
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: atlas
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: fluxbot
        email: flux@internal.example.com
      messageTemplate: "chore: update images to {{range .Changed.Changes}}{{print .NewValue}} {{end}}"
    push:
      branch: main
  update:
    path: ./deploy/k8s/overlays/prod
    strategy: Setters
