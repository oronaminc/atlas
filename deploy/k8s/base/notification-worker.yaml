apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-notification-worker
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: notification-worker
spec:
  # MUST stay replicas: 1. Delivery is exactly-once at any N (outbox CAS+lease,
  # so restarts never lose alerts), BUT the per-second send throttle is a
  # per-PROCESS TokenBucket — N replicas would push the aggregate send rate to
  # ~N x telegram_rate_per_second and blow the bot budget. Do NOT scale past 1
  # until a distributed (Redis/DB) rate limiter replaces the in-process bucket.
  # (Daily/group quotas are DB-counted and stay correct regardless.)
  replicas: 1
  # Zero-downtime updates: bring the replacement up (Ready) before retiring the
  # old pod, so the worker is never fully absent during a rollout.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas
      app.kubernetes.io/component: notification-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas
        app.kubernetes.io/component: notification-worker
    spec:
      containers:
        - name: notification-worker
          image: ghcr.io/oronaminc/atlas/backend:latest
          command: ["python", "-m", "app.workers.notification_worker"]
          ports:
            - containerPort: 9100
              name: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 15
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
