apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - backend.yaml
  - sync-worker.yaml
  - correlation-worker.yaml
  - notification-worker.yaml
  - maintenance-worker.yaml
  - llm-worker.yaml
  - frontend.yaml
  - ingress.yaml
# prometheus-rules.yaml is a PrometheusRule CRD (needs the Prometheus Operator);
# kept OUT of this kustomization so kubeconform -strict stays green. Apply with
# `kubectl apply -f deploy/k8s/base/prometheus-rules.yaml` or load its `groups:`
# into your Prometheus rule_files (see README).

# NO images: block here on purpose. base is NOT a deploy target — deploy an
# OVERLAY (overlays/dev or overlays/prod). The image TAG is owned solely by each
# overlay's `images:` (newName/newTag), so dev and prod set their tag in exactly
# ONE place and diverge independently. The same two streams cover every pod:
# backend image = backend + all workers (sync/correlation/notification/
# maintenance/llm) + the migrate initContainer; frontend image = frontend.
# (Applying base directly would run the manifests' literal :latest placeholder.)
