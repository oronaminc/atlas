apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - backend.yaml
  - sync-worker.yaml
  - correlation-worker.yaml
  - notification-worker.yaml
  - maintenance-worker.yaml
  - llm-worker.yaml
  - frontend.yaml
  - ingress.yaml
# prometheus-rules.yaml is a PrometheusRule CRD (needs the Prometheus Operator);
# kept OUT of this kustomization so kubeconform -strict stays green. Apply with
# `kubectl apply -f deploy/k8s/base/prometheus-rules.yaml` or load its `groups:`
# into your Prometheus rule_files (see README).

# Image repos/placeholder tags only. EACH OVERLAY owns its own newName/newTag
# via its `images:` field, so dev and prod run INDEPENDENT tags — bumping dev
# never forces prod (and vice versa). The same two image streams cover every
# pod: backend image = backend + all workers (sync/correlation/notification/
# maintenance/llm); frontend image = frontend.
images:
  - name: ghcr.io/oronaminc/atlas/backend
    newTag: latest
  - name: ghcr.io/oronaminc/atlas/frontend
    newTag: latest
