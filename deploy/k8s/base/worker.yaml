apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-worker
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: worker
spec:
  # The Redis lock allows >1 replica, but one is enough for the sync cadence.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/oronaminc/atlas/backend:latest
          command: ["python", "-m", "app.workers.sync_worker"]
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
