apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-config
  namespace: atlas
# Environment-AGNOSTIC config only. Host-bearing/per-env values
# (ATLAS_PUBLIC_URL, FRONTEND_URL, CORS_ORIGINS) live in each overlay; the
# prefix (ROOT_PATH) is identical dev+prod so it stays here.
data:
  APP_ENV: "prod"
  # Subpath deploy: atlas is served under /alert-hub (same dev+prod; only the
  # host differs per overlay). The ingress strips this before the backend, so
  # ROOT_PATH only drives docs/openapi + auth-cookie URL generation.
  ROOT_PATH: "/alert-hub"
  # Multi-tenancy: always sent as X-Scope-OrgID on every Mimir/Loki/Tempo call.
  MIMIR_TENANT_ID: "system"
  SYNC_INTERVAL_SECONDS: "30"
