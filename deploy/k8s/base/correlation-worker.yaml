apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-correlation-worker
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: correlation-worker
spec:
  # Dedup state lives in Redis; PG-poll batches are idempotent, but keep one
  # replica unless throughput demands more.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas
      app.kubernetes.io/component: correlation-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas
        app.kubernetes.io/component: correlation-worker
    spec:
      containers:
        - name: correlation-worker
          image: ghcr.io/oronaminc/atlas/backend:latest
          command: ["python", "-m", "app.workers.correlation_worker"]
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
