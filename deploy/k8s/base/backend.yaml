apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-backend
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
      labels:
        app.kubernetes.io/name: atlas
        app.kubernetes.io/component: backend
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/oronaminc/atlas/backend:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
      containers:
        - name: backend
          image: ghcr.io/oronaminc/atlas/backend:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-backend
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: backend
  ports:
    - port: 8000
      targetPort: http
      name: http
