apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas
  namespace: atlas
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
spec:
  ingressClassName: nginx
  rules:
    - host: atlas.example.com
      http:
        paths:
          # /api goes straight to the backend (skips the frontend nginx hop).
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: atlas-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlas-frontend
                port:
                  number: 80
