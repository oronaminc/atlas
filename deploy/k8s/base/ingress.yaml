apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas
  namespace: atlas
  annotations:
    # Traefik (same controller as Grafana on this host). Chain (order matters):
    # 1) redirect the bare /alert-hub -> /alert-hub/ (else the SPA loads blank),
    # 2) strip /alert-hub so the app/nginx still see "/" internally (replaces the
    # old nginx rewrite-target; no app code change). Ref: <ns>-<name>@kubernetescrd.
    traefik.ingress.kubernetes.io/router.middlewares: atlas-redirect-alert-hub-slash@kubernetescrd,atlas-stripprefix-alert-hub@kubernetescrd
    # Guarantee atlas wins over Grafana's "/" catch-all on the shared host.
    # Traefik evaluates routers by DESCENDING priority; an explicit value
    # REPLACES the default (= rule length), so it must be set high enough to beat
    # Grafana's "/" router (whose own priority may be rule-length- or explicitly-
    # derived). A large constant makes /alert-hub unambiguously win.
    traefik.ingress.kubernetes.io/router.priority: "100000"
spec:
  # Match Grafana's controller (Grafana uses the field, not the annotation).
  ingressClassName: traefik-monitoring
  rules:
    # Host is patched per overlay (dev: atlas-dev.sktelecom.com,
    # prod: atlas.sktelecom.com). Grafana owns "/" on the same host.
    - host: atlas.example.com
      http:
        paths:
          - path: /alert-hub
            pathType: Prefix
            backend:
              service:
                name: atlas-frontend
                port:
                  number: 80
---
# Traefik stripPrefix: removes /alert-hub before the request reaches
# atlas-frontend (nginx serves the SPA at / and proxies /api/ -> backend).
# NOTE: CRD apiGroup is traefik.io on Traefik v3 / recent v2; if your cluster
# runs the legacy group, change this to traefik.containo.us/v1alpha1.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: stripprefix-alert-hub
  namespace: atlas
spec:
  stripPrefix:
    prefixes:
      - /alert-hub
---
# Redirect the exact bare path /alert-hub -> /alert-hub/ (301) so the SPA always
# loads from the trailing-slash base. Runs BEFORE stripPrefix in the chain.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-alert-hub-slash
  namespace: atlas
spec:
  redirectRegex:
    regex: ^(https?://[^/]+)/alert-hub$
    replacement: ${1}/alert-hub/
    permanent: true
