apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas
  namespace: atlas
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "4m"
    # Subpath deploy: atlas shares a host with Grafana and lives under
    # /alert-hub. Strip the prefix before the frontend nginx (which serves the
    # SPA at / and proxies /api/ -> backend). Nothing of atlas is served at "/".
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    # Host is patched per overlay (dev: atlas-dev.sktelecom.com,
    # prod: atlas.sktelecom.com). Grafana owns the rest of the host.
    - host: atlas.example.com
      http:
        paths:
          - path: /alert-hub(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: atlas-frontend
                port:
                  number: 80
