# NOT applied by kustomize — copy, fill in, and create manually (or use
# ExternalSecrets/SealedSecrets in real clusters):
#   kubectl -n atlas create secret generic atlas-secrets \
#     --from-literal=SECRET_KEY=... \
#     --from-literal=FERNET_KEY=... \
#     --from-literal=DATABASE_URL=postgresql+asyncpg://user:pass@host:5432/atlas \
#     --from-literal=REDIS_URL=redis://redis-host:6379/0 \
#     --from-literal=OIDC_ISSUER=... \
#     --from-literal=OIDC_CLIENT_ID=... \
#     --from-literal=OIDC_CLIENT_SECRET=... \
#     --from-literal=OIDC_REDIRECT_URI=https://atlas.example.com/api/v1/auth/oidc/callback
apiVersion: v1
kind: Secret
metadata:
  name: atlas-secrets
  namespace: atlas
type: Opaque
stringData:
  SECRET_KEY: "change-me"
  FERNET_KEY: "change-me"            # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  DATABASE_URL: "postgresql+asyncpg://atlas:atlas@atlas-postgres:5432/atlas"
  REDIS_URL: "redis://atlas-redis:6379/0"
  INGEST_API_KEY: "change-me"
  OIDC_ISSUER: ""
  OIDC_CLIENT_ID: ""
  OIDC_CLIENT_SECRET: ""
  OIDC_REDIRECT_URI: ""
