# /metrics is infra-internal and unauthenticated — it must never be reachable
# from the public Ingress, only from the Prometheus scraper. This policy allows
# ingress to the metrics surfaces (8000 on backend, 9100 on workers) ONLY from
# pods labelled as the scraper. The public Ingress already targets the backend
# Service on 8000 for the API; if your cluster co-mingles them, run /metrics on
# a separate port instead. Adjust the podSelector to your Prometheus install.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: atlas-metrics-scrape-only
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: atlas
  policyTypes:
    - Ingress
  ingress:
    # worker metrics port — scraper only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 9100
          protocol: TCP
    # backend: API (8000) stays open to the ingress controller; /metrics shares
    # the port, so restrict scrape-sensitive access at the ingress (do NOT add a
    # /metrics path to the public Ingress route). Scraper reaches 8000 too:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 8000
          protocol: TCP
