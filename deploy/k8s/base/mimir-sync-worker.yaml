apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-mimir-sync-worker
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: mimir-sync-worker
spec:
  # Single replica; the Redis lock makes extra replicas no-ops anyway.
  replicas: 1
  # Zero-downtime updates: bring the replacement up (Ready) before retiring the
  # old pod, so the worker is never fully absent during a rollout.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas
      app.kubernetes.io/component: mimir-sync-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas
        app.kubernetes.io/component: mimir-sync-worker
    spec:
      containers:
        - name: mimir-sync-worker
          image: ghcr.io/oronaminc/atlas/backend:latest
          command: ["python", "-m", "app.workers.mimir_sync_worker"]
          ports:
            - containerPort: 9100
              name: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 15
          envFrom:
            - configMapRef:
                name: atlas-config
            - secretRef:
                name: atlas-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
