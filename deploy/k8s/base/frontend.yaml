apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-frontend
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  # Zero-downtime updates: never take a replica down until its replacement is
  # Ready (readinessProbe-gated), so >=1 pod always serves — even at replicas: 1.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/oronaminc/atlas/frontend:latest
          ports:
            - containerPort: 80
              name: http
          env:
            - name: BACKEND_ORIGIN
              value: "http://atlas-backend:8000"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-frontend
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: frontend
  ports:
    - port: 80
      targetPort: http
      name: http
