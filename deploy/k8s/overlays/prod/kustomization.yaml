apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Replace with the internal GitLab container registry path.
# newTag is a semver MAJOR.MINOR.PATCH (CI tags 0.1.<pipeline-iid>); the marker
# comments are where Flux ImageUpdateAutomation (semver ImagePolicy) commits the
# highest tag. Seed 0.1.0; Flux overwrites it.
images:
  - name: ghcr.io/oronaminc/atlas/backend
    newName: registry.gitlab.internal/platform/atlas/backend
    newTag: 0.1.0 # {"$imagepolicy": "flux-system:atlas-backend:tag"}
  - name: ghcr.io/oronaminc/atlas/frontend
    newName: registry.gitlab.internal/platform/atlas/frontend
    newTag: 0.1.0 # {"$imagepolicy": "flux-system:atlas-frontend:tag"}

patches:
  # Shares atlas.sktelecom.com with Grafana; atlas lives under /alert-hub.
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: atlas.sktelecom.com
    target:
      kind: Ingress
      name: atlas
  - patch: |-
      # Added here (not in base): host-bearing, env-specific.
      - op: add
        path: /data/CORS_ORIGINS
        value: https://atlas.sktelecom.com
      - op: add
        path: /data/FRONTEND_URL
        value: https://atlas.sktelecom.com/alert-hub
      - op: add
        path: /data/ATLAS_PUBLIC_URL
        value: https://atlas.sktelecom.com/alert-hub
      # Observability endpoints — per-overlay so dev/prod can point at different
      # stacks. Same values as the former base today (status quo); change freely.
      - op: add
        path: /data/MIMIR_RULER_URL
        value: http://mimir.observability.svc:8080/prometheus/config/v1/rules
      - op: add
        path: /data/MIMIR_ALERTMANAGER_URL
        value: http://mimir-alertmanager.observability.svc:8080
      - op: add
        path: /data/MIMIR_QUERY_URL
        value: http://mimir.observability.svc:8080/prometheus
      - op: add
        path: /data/LOKI_URL
        value: http://loki.observability.svc:3100
      - op: add
        path: /data/TEMPO_URL
        value: http://tempo.observability.svc:3200
      - op: add
        path: /data/GRAFANA_URL
        value: http://grafana.observability.svc:3000
    target:
      kind: ConfigMap
      name: atlas-config
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: atlas-notification-worker
