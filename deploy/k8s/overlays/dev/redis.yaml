apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-redis
  namespace: atlas
  labels:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: atlas
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlas
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-redis
  namespace: atlas
spec:
  selector:
    app.kubernetes.io/name: atlas
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
      targetPort: redis
